<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Closer Copilot</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/app.css">
</head>
<body>

<!-- LOGIN -->
<div class="veil" id="login">
  <div class="loginbox">
    <div class="brand">CLOSER <span>COPILOT</span></div>
    <p class="sub">Your live sales coach with deal memory.</p>
    <div class="msg" id="lmsg"></div>
    <input id="lemail" type="email" placeholder="Email" autocomplete="email">
    <input id="lpass" type="password" placeholder="Password (min 6 characters)" autocomplete="current-password">
    <button id="lsignin" class="wide">Sign in</button>
    <button id="lsignup" class="wide ghost">Create account</button>
  </div>
</div>

<!-- APP SHELL -->
<div id="app" class="hidden">
  <aside id="sidebar">
    <div class="logo">CLOSER <span>COPILOT</span></div>
    <button id="navNew" class="newcall">＋ New Call</button>
    <nav>
      <a href="#/home"     data-nav="home">🏠 Home</a>
      <a href="#/clients"  data-nav="clients">👥 Clients</a>
      <a href="#/calls"    data-nav="calls">📞 Calls</a>
      <a href="#/products" data-nav="products">📦 Products</a>
    </nav>
    <div class="side-foot">
      <div id="whoami" class="who"></div>
      <button id="signout" class="ghost sm">Sign out</button>
    </div>
  </aside>

  <main id="main">
    <div id="callbar" class="callbar hidden">● Call in progress <a href="#/live">return to call →</a></div>
    <div id="view"></div>
  </main>
</div>

<script type="module" src="/app.js"></script>
</body>
</html>
